# =============================================================================
# Tmux Configuration - Minimal Setup
# =============================================================================

# Set prefix to Ctrl-b (default)
set-option -g prefix C-b

# Enable mouse support
set -g mouse on

# Set terminal colors to 256-color mode
set -g default-terminal "screen-256color"

# Increase history limit
set -g history-limit 5000

# =============================================================================
# Key Bindings
# =============================================================================

# Split panes with | and -
bind | split-window -h
bind - split-window -v

# Navigate panes with arrow keys
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Create new window with c
bind c new-window

# Close window/pane with x
bind x kill-pane

# Reload config with r
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# =============================================================================
# Status Bar
# =============================================================================

# Status bar at bottom
set -g status-position bottom

# Status bar background and foreground colors
set -g status-bg black
set -g status-fg white

# Left side: session name
set -g status-left "[#S]"
set -g status-left-length 20

# Right side: date and time
set -g status-right "%Y-%m-%d %H:%M"
set -g status-right-length 30

# Status bar refresh interval
set -g status-interval 1

# =============================================================================
# Pane Border Colors
# =============================================================================

set -g pane-border-style fg=white
set -g pane-active-border-style fg=green

# =============================================================================
# Tmux Plugin Manager (TPM)
# =============================================================================

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'erikw/tmux-powerline'

# Powerline configuration (applied after plugins load)
set -g @powerline-status-left-area-left-format "%S"
set -g @powerline-status-right-area-right-format "%d-%m-%Y %H:%M"

# Initialize TPM (must be at the bottom of config)
# This loads all plugins and their configurations
run '~/.tmux/plugins/tpm/tpm'
