# =============================================================================
# Tmux Configuration - Minimal Setup
# =============================================================================

# Set prefix to Ctrl-b (default)
set-option -g prefix C-b

# Enable mouse support
set -g mouse on

# Set terminal colors to 256-color mode
set -g default-terminal "screen-256color"

# Increase history limit
set -g history-limit 5000

# =============================================================================
# Key Bindings
# =============================================================================

# Split panes with | and -
bind | split-window -h
bind - split-window -v

# Navigate panes with arrow keys
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Create new window with c
bind c new-window

# Close window/pane with x
bind x kill-pane

# Reload config with r
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# =============================================================================
# Status Bar - SteamOS Theme
# =============================================================================

# Status bar background and foreground
set -g status-style bg="#0E1419",fg="#00BFFF"

# Status bar refresh interval
set -g status-interval 1

# Left status - session name
set -g status-left "#[bg=#00BFFF,fg=#0E1419,bold] #{session_name} #[default] "
set -g status-left-length 20

# Right status - time and date
set -g status-right "#[bg=#00BFFF,fg=#0E1419,bold] %H:%M:%S #[default]"
set -g status-right-length 20

# Window status
set -g window-status-format "#[bg=#1a2332,fg=#00BFFF] #W "
set -g window-status-current-format "#[bg=#00BFFF,fg=#0E1419,bold] #W #[default]"

# =============================================================================
# Pane Border Colors
# =============================================================================

# Steam dark theme borders
set -g pane-border-style fg="#0E1419"
set -g pane-active-border-style fg="#00BFFF"
